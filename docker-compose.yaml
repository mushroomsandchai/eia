services:
  postgres:
    image: postgres:15-alpine
    container_name: airflow-postgres
    networks:
      - airflow-net
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow:
    build: .
    container_name: airflow
    user: "${AIRFLOW_UID:-50000}:0"
    networks:
      - airflow-net
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - ./airflow/logs:/opt/airflow/logs
      - ./streamlit:/opt/airflow/streamlit
      - ./batch_files:/tmp/historical_data
      - "${LOCAL_GCS_JSON_CREDENTIALS_PATH}:${CONTAINER_JSON_CREDENTIALS_PATH}.cred.json"
    ports:
      - "8080:8080"   # airflow
      - "8501:8501"   # streamlit
      - "8082:8082"   # dbt docs
    command:
      - bash
      - -c
      - |
          streamlit run /opt/airflow/streamlit/app.py &
          cd $$DBT_PROJECT_PATH &&
          $$DBT_VIRTUAL_ENVIRONMENT_PATH deps &&
          $$DBT_VIRTUAL_ENVIRONMENT_PATH parse &&
          airflow standalone &
          /opt/airflow/.dbt_venv/bin/dbt docs generate --project-dir /opt/airflow/dbt --profiles-dir /opt/airflow/dbt &&
          cd /opt/airflow/dbt/target &&
          python3 -m http.server 8082 --bind 0.0.0.0 &
          wait

volumes:
  postgres_data:

networks:
  airflow-net:
    driver: bridge